<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C2E"/>
      <stop offset="100%" style="stop-color:#0F0F1E"/>
    </linearGradient>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#9C27B0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect width="1024" height="1024" rx="224" ry="224"
        fill="none" stroke="url(#pGrad)" stroke-width="3" opacity="0.25"/>

  <!-- Glow blob behind P -->
  <ellipse cx="512" cy="490" rx="280" ry="260"
           fill="#6C63FF" opacity="0.08" filter="url(#glow)"/>

  <!-- Letter P — bold geometric, centered -->
  <text
    x="512" y="680"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="620"
    text-anchor="middle"
    fill="url(#pGrad)"
    filter="url(#glow)"
  >P</text>
</svg>
